services:
  video-dl-api:
    build: .
    container_name: video-dl-api
    restart: unless-stopped
    env_file: .env
    environment:
      - COBALT_API_URL=http://cobalt-api:9000/
    ports:
      - "127.0.0.1:8091:8000"
    volumes:
      - ./release:/release:ro
    depends_on:
      - cobalt-api

  cobalt-api:
    # Pin to v10: v11 (11.7.1) has a broken tunnel (streams 0 bytes / content-length:0),
    # see imputnet/cobalt issues #1455, #1317. v10 streams correctly. read_only removed
    # (didn't help the tunnel and is not required).
    image: ghcr.io/imputnet/cobalt:10
    container_name: cobalt-api
    restart: unless-stopped
    init: true
    environment:
      - API_URL=http://cobalt-api:9000/
    # internal-only: no `ports:` block on purpose.
